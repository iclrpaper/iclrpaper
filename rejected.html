<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拒稿论文</title>
    <!-- 引入与首页相同的CSS资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#344054',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-secondary">
    <!-- 导航栏 (与首页一致) -->
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <i class="fa-solid fa-book-journal-whills text-2xl text-primary"></i>
                    <span class="text-xl font-bold text-primary">ICLR底会</span>
                </a>
                <button id="mobile-menu-button" class="lg:hidden text-gray-500 hover:text-primary">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <nav class="hidden lg:flex space-x-8">
                    <a href="index.html" class="hover:text-primary transition-colors">首页</a>
                    <a href="submission.html" class="hover:text-primary transition-colors">投稿指南</a>
                    <a href="published.html" class="text-primary font-medium">已发表论文</a>
                    <a href="rejected.html" class="hover:text-primary transition-colors">退稿案例</a>
                    <a href="#" class="hover:text-primary transition-colors">关于我们</a>
                </nav>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t border-gray-100">
            <div class="container mx-auto px-4 py-3 space-y-2">
                <a href="index.html" class="block py-2 hover:text-primary">首页</a>
                <a href="submission.html" class="block py-2 hover:text-primary">投稿指南</a>
                <a href="published.html" class="block py-2 text-primary font-medium">已发表论文</a>
                <a href="rejected.html" class="block py-2 hover:text-primary">退稿案例</a>
                <a href="#" class="block py-2 hover:text-primary">关于我们</a>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="max-w-4xl mx-auto">
            <!-- 页面标题 -->
            <div class="mb-10 border-b border-gray-200 pb-4">
                <h1 class="text-3xl font-bold mb-2">拒稿论文</h1>
                <p class="text-gray-500">共拒稿 <span class="font-semibold text-primary">0</span> 篇学术论文，点击标题下方链接可下载PDF全文。</p>
            </div>

            <!-- 论文列表 -->
            <div class="space-y-6">
                <!-- 论文项 1 -->
                <div class="bg-white rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow">
                    <h2 class="text-xl font-semibold mb-2">title1</h2>
                    <p class="text-gray-600 mb-4">作者：张三, 李四, 王五 | 单位：XX大学文学院</p>
                    <div class="flex items-center">
                        <a href="#" class="flex items-center text-primary hover:text-primary/80 font-medium">
                            <i class="fa-solid fa-file-pdf mr-2 text-red-500"></i>
                            下载PDF全文
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 (与首页一致) -->
    <footer class="bg-secondary text-white pt-12 pb-8">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center text-gray-400 pt-8 border-t border-white/20">
                <p>© 2025 ICLR底会编辑部 版权所有</p>
            </div>
        </div>
    </footer>

    <script>
        // 移动端菜单JS
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
