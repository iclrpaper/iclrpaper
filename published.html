<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已发表论文</title>
    <!-- 引入与首页相同的CSS资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#344054',
                        like: '#ff4d6d', // 点赞爱心颜色
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-secondary">
    <!-- 导航栏 (与首页一致) -->
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <i class="fa-solid fa-book-journal-whills text-2xl text-primary"></i>
                    <span class="text-xl font-bold text-primary">ICLR底会</span>
                </a>
                <button id="mobile-menu-button" class="lg:hidden text-gray-500 hover:text-primary">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <nav class="hidden lg:flex space-x-8">
                    <a href="index.html" class="hover:text-primary transition-colors">首页</a>
                    <a href="submission.html" class="hover:text-primary transition-colors">投稿指南</a>
                    <a href="published.html" class="text-primary font-medium">已发表论文</a>
                    <a href="rejected.html" class="hover:text-primary transition-colors">退稿案例</a>
                    <a href="contact.html" class="hover:text-primary transition-colors">联系我们</a>
                </nav>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t border-gray-100">
            <div class="container mx-auto px-4 py-3 space-y-2">
                <a href="index.html" class="block py-2 hover:text-primary">首页</a>
                <a href="submission.html" class="block py-2 hover:text-primary">投稿指南</a>
                <a href="published.html" class="block py-2 text-primary font-medium">已发表论文</a>
                <a href="rejected.html" class="block py-2 hover:text-primary">退稿案例</a>
                <a href="contact.html" class="block py-2 hover:text-primary">联系我们</a>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="max-w-4xl mx-auto">
            <!-- 页面标题 -->
            <div class="mb-10 border-b border-gray-200 pb-4">
                <h1 class="text-3xl font-bold mb-2">已发表论文</h1>
                <p class="text-gray-500">共收录 <span id="paper-count" class="font-semibold text-primary">0</span> 篇学术论文，点击标题下方链接可下载PDF全文。</p>
                <!-- 新增：总点赞数显示 -->
                <p class="text-gray-500 mt-2">总点赞数：<span id="total-like-count" class="font-semibold text-like">0</span></p>
            </div>

            <!-- 论文列表 (给容器加id，方便JS获取) -->
            <div id="paper-list" class="space-y-6">
                <!-- 论文项 1 (新增点赞功能) -->
                <div class="bg-white rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow" data-paper-id="paper1">
                    <h2 class="text-xl font-semibold mb-2">title1</h2>
                    <p class="text-gray-600 mb-4">作者：张三, 李四, 王五 | 单位：XX大学文学院</p>
                    <div class="flex items-center justify-between">
                        <a href="#" class="flex items-center text-primary hover:text-primary/80 font-medium">
                            <i class="fa-solid fa-file-pdf mr-2 text-red-500"></i>
                            下载PDF全文
                        </a>
                        <!-- 点赞按钮 -->
                        <div class="like-button flex items-center space-x-2 cursor-pointer" data-paper-id="paper1">
                            <i class="fa-solid fa-heart text-xl text-gray-400 hover:text-like transition-colors like-icon"></i>
                            <span class="like-count text-gray-600">0</span>
                        </div>
                    </div>
                </div>

                <!-- 论文项 2 (新增点赞功能) -->
                <div class="bg-white rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow" data-paper-id="paper2">
                    <h2 class="text-xl font-semibold mb-2">title2</h2>
                    <p class="text-gray-600 mb-4">作者：赵六, 钱七 | 单位：XX研究院</p>
                    <div class="flex items-center justify-between">
                        <a href="#" class="flex items-center text-primary hover:text-primary/80 font-medium">
                            <i class="fa-solid fa-file-pdf mr-2 text-red-500"></i>
                            下载PDF全文
                        </a>
                        <!-- 点赞按钮 -->
                        <div class="like-button flex items-center space-x-2 cursor-pointer" data-paper-id="paper2">
                            <i class="fa-solid fa-heart text-xl text-gray-400 hover:text-like transition-colors like-icon"></i>
                            <span class="like-count text-gray-600">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 (与首页一致) -->
    <footer class="bg-secondary text-white pt-12 pb-8">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center text-gray-400 pt-8 border-t border-white/20">
                <p>© 2025 ICLR底会编辑部 版权所有</p>
            </div>
        </div>
    </footer>

    <script>
        // 移动端菜单JS
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // 1. 自动统计论文数量并更新显示
        document.addEventListener('DOMContentLoaded', function() {
            // 统计论文数量
            const paperList = document.getElementById('paper-list');
            const paperItems = paperList.querySelectorAll('.bg-white.rounded-lg.p-6.shadow-sm');
            const paperCountElement = document.getElementById('paper-count');
            paperCountElement.textContent = paperItems.length;

            // 2. 点赞功能核心逻辑
            initLikeFunction();
            // 3. 计算并显示总点赞数
            updateTotalLikeCount();
        });

        // 初始化点赞功能
        function initLikeFunction() {
            // 获取所有点赞按钮
            const likeButtons = document.querySelectorAll('.like-button');
            
            // 从本地存储加载点赞数据（刷新页面不丢失）
            const likeData = JSON.parse(localStorage.getItem('paperLikes')) || {};
            
            // 初始化每篇论文的点赞数和状态
            likeButtons.forEach(button => {
                const paperId = button.getAttribute('data-paper-id');
                const likeCountEl = button.querySelector('.like-count');
                const likeIconEl = button.querySelector('.like-icon');
                
                // 设置初始点赞数
                likeCountEl.textContent = likeData[paperId]?.count || 0;
                // 设置初始点赞状态（已点赞则红心）
                if (likeData[paperId]?.liked) {
                    likeIconEl.classList.remove('text-gray-400');
                    likeIconEl.classList.add('text-like');
                }

                // 点击点赞按钮事件
                button.addEventListener('click', () => {
                    // 获取当前论文ID和数据
                    const currentPaperId = button.getAttribute('data-paper-id');
                    const currentCount = parseInt(likeCountEl.textContent);
                    const isLiked = likeIconEl.classList.contains('text-like');

                    if (isLiked) {
                        // 取消点赞：数量-1，图标变灰
                        likeCountEl.textContent = currentCount - 1;
                        likeIconEl.classList.remove('text-like');
                        likeIconEl.classList.add('text-gray-400');
                        likeData[currentPaperId] = {
                            count: currentCount - 1,
                            liked: false
                        };
                    } else {
                        // 点赞：数量+1，图标变红
                        likeCountEl.textContent = currentCount + 1;
                        likeIconEl.classList.remove('text-gray-400');
                        likeIconEl.classList.add('text-like');
                        likeData[currentPaperId] = {
                            count: currentCount + 1,
                            liked: true
                        };
                    }

                    // 保存到本地存储
                    localStorage.setItem('paperLikes', JSON.stringify(likeData));
                    // 更新总点赞数
                    updateTotalLikeCount();
                });
            });
        }

        // 计算并更新总点赞数
        function updateTotalLikeCount() {
            const likeData = JSON.parse(localStorage.getItem('paperLikes')) || {};
            let total = 0;
            
            // 遍历所有论文的点赞数求和
            Object.keys(likeData).forEach(paperId => {
                total += likeData[paperId]?.count || 0;
            });
            
            // 显示总点赞数
            document.getElementById('total-like-count').textContent = total;
        }
    </script>
</body>
</html>
